<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Full Screen Image</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* чтобы красиво растягивалось */
        }
    </style>
</head>
<body>
    <img src="pic.jpg" alt="image">
</body>
</html>
