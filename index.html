<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Fullscreen Image</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background: black; /* фон если будут пустые поля */
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* ВАЖНО: без обрезки */
        }
    </style>
</head>
<body>
    <img src="pic.jpg" alt="image">
</body>
</html>
